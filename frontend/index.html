<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="7ykoSVdPvlxTbn9oR0iUs5QT_wwf7-Q8_McqSViK-i8" />

    <!-- ═══════════════════════════════════════════════════════════════
         PRIMARY SEO
         This is what Google shows in search results.
         Title: keep under 60 characters.
         Description: keep under 160 characters — this is your pitch.
    ════════════════════════════════════════════════════════════════ -->
    <title>CelerVote — Online Voting & Event Ticketing Platform Ghana</title>
    <meta name="description" content="CelerVote is Ghana's leading platform for secure online elections, organisational voting, talent contests, and event ticketing. Real-time results. Free to start." />
    <meta name="keywords" content="online voting Ghana, electronic voting platform, e-voting Ghana, school elections Ghana, talent contest voting, event ticketing Ghana, organisational elections, USSD voting Ghana" />
    <meta name="author" content="CelerVote" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://celervote.com/" />

    <!-- ═══════════════════════════════════════════════════════════════
         OPEN GRAPH — WhatsApp, Facebook, LinkedIn previews
         When someone shares your link, this is what they see.
    ════════════════════════════════════════════════════════════════ -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://celervote.com/" />
    <meta property="og:site_name"   content="CelerVote" />
    <meta property="og:title"       content="CelerVote — Secure Online Voting & Ticketing for Ghana" />
    <meta property="og:description" content="Run secure elections, organisational votes, talent contests, and sell event tickets — all in one platform. Used by schools, churches, and corporates across Ghana." />
    <meta property="og:image"       content="https://celervote.com/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="en_GH" />

    <!-- ═══════════════════════════════════════════════════════════════
         TWITTER / X CARD
         Controls how your link looks when shared on Twitter/X.
    ════════════════════════════════════════════════════════════════ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@celervote" />
    <meta name="twitter:title"       content="CelerVote — Secure Online Voting & Ticketing" />
    <meta name="twitter:description" content="Run secure elections, talent contests, and sell event tickets in Ghana. Real-time results. Free to start." />
    <meta name="twitter:image"       content="https://celervote.com/og-image.png" />

    <!-- ═══════════════════════════════════════════════════════════════
         STRUCTURED DATA (JSON-LD)
         This is invisible to users but read by Google.
         Helps Google understand exactly what CelerVote is —
         a software product — and can unlock rich search results.
    ════════════════════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "CelerVote",
      "url": "https://celervote.com",
      "logo": "https://celervote.com/celervote-logo-light.svg",
      "description": "CelerVote is Ghana's leading secure electronic voting and event ticketing platform. Run online elections, organisational votes, talent contests, surveys, and sell event tickets with real-time results.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, Android, iOS",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "GHS",
        "description": "Free to start. Paid events charge per vote."
      },
      "featureList": [
        "Secure online elections",
        "Organisational voting with voter roll management",
        "Talent contest and awards voting",
        "Event ticketing with QR code check-in",
        "USSD voting for feature phones",
        "Real-time live results",
        "Fraud detection and audit logs",
        "SMS notifications"
      ],
      "areaServed": {
        "@type": "Country",
        "name": "Ghana"
      },
      "inLanguage": ["en", "tw", "ha", "fr"],
      "sameAs": [
        "https://twitter.com/celervote"
      ]
    }
    </script>

    <!-- ═══════════════════════════════════════════════════════════════
         ORGANISATION structured data — helps Google Knowledge Panel
    ════════════════════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "CelerVote",
      "url": "https://celervote.com",
      "logo": "https://celervote.com/celervote-logo-light.svg",
      "description": "Secure electronic voting and event ticketing platform based in Ghana.",
      "areaServed": "Ghana",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://celervote.com/contact"
      }
    }
    </script>

    <!-- ═══════════════════════════════════════════════════════════════
         FAVICON & ICONS
    ════════════════════════════════════════════════════════════════ -->
    <link rel="icon"             href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- ═══════════════════════════════════════════════════════════════
         FONTS
    ════════════════════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800&display=swap" rel="stylesheet" />

    <!-- Paystack -->
    <script src="https://js.paystack.co/v1/inline.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
